<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Website Title Configuration -->
    <title>Prof.Yulei Sui's Research Group</title>
    <meta content="" name="description">
    <meta content="" name="keywords">

    <!-- Browser's Webpage Logo -->
    <link href="assets/img/uts_logo.png" rel="icon">

    <!-- Connect with CSS Files -->
    <link href="assets/vendor/aos/aos.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
    <link href="assets/vendor/boxIcons/css/boxIcons.min.css" rel="stylesheet">
    <link href="assets/vendor/gLightBox/css/gLightBox.min.css" rel="stylesheet">
    <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

    <!-- Template Main CSS File -->
    <link href="assets/css/index.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="row" style="margin-left: 15px;margin-right: 15px">
        <div class="col-md-3 col-sm-3 portfolio-item">
            <a href="" class="portfolio-link" data-toggle="modal">
                <div class="portfolio-hover">
                    <div class="portfolio-hover-content img-circle">
                        <i class="fa fa-plus fa-3x"></i>
                    </div>
                </div>
                <img src="assets/img/Yuxiang_Lei.png" class="img-fluid rounded-square" alt="">
            </a>
            <div class="portfolio-caption">
                <p class="text-muted">description</p>
                <h3>person.name</h3>
                <h6 class="job-title">person.role</h6>
                <p class="email">person.email</p>
                <ul class="list-inline social-buttons">
                    <li class="social-button-item"><a href=""><i class="fa fa-{{ network.icon }}"></i></a>
                    </li>
                </ul>
                <button class="btn btn-primary" type="button" data-toggle="collapse" data-target="#{{ forloop.index }}" aria-expanded="false" aria-controls="">
                    bio
                </button>
                <div class="collapse" id="{{ forloop.index }}">
                    <div class="card card-block">
                        <p class="text-muted">person.description</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
